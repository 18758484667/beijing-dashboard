<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北京 2025 年 7–8 月 气温与降雨量</title>
<style>
  :root{
    --bg:#F5F5F5; --card:#FFFFFF; --ink:#1A1A1A; --muted:#8A8A8A;
    --accent:#FF5C1A; --cool:#2E86DE; --line:#E2E2E2; --band:#FBF0EA;
    --prec:#7FB6F2; --prec-heavy:#2E86DE;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}
  body{background:var(--bg);color:var(--ink);padding:32px 16px;display:flex;justify-content:center;}
  .wrap{width:100%;max-width:900px;}
  h1{font-size:22px;letter-spacing:.5px;margin-bottom:4px;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .stat .k{font-size:12px;color:var(--muted);}
  .stat .v{font-size:20px;font-weight:600;margin-top:4px;}
  .stat .v small{font-size:12px;color:var(--muted);font-weight:400;}
  .chart-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 16px 8px;position:relative;}
  svg{width:100%;height:auto;display:block;}
  .legend{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin:8px 0 4px;font-size:13px;color:var(--muted);}
  .legend i{display:inline-block;width:14px;height:3px;border-radius:2px;vertical-align:middle;margin-right:6px;}
  .legend .bar{display:inline-block;width:10px;height:11px;border-radius:2px;vertical-align:middle;margin-right:6px;}
  .note{font-size:12px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.6;}
  #tip{position:absolute;pointer-events:none;background:rgba(26,26,26,.92);color:#fff;
       font-size:12px;line-height:1.5;padding:8px 10px;border-radius:8px;white-space:nowrap;
       transform:translate(-50%,-115%);opacity:0;transition:opacity .12s;z-index:5;}
  #tip b{font-size:13px;}
  #tip .hi{color:#FF9B6B;} #tip .lo{color:#7FB6F2;} #tip .pr{color:#A9D2F5;}
  @media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="wrap">
  <h1>北京气温与降雨量 · 2025年7–8月</h1>
  <div class="sub">逐日最高/最低气温（℃）与降水量（mm）｜ 气温来源 IP.cn，降雨量来源 tianqi24</div>

  <div class="stats">
    <div class="stat"><div class="k">7月 平均高温</div><div class="v">32.0<small>℃</small></div></div>
    <div class="stat"><div class="k">8月 平均高温</div><div class="v">30.3<small>℃</small></div></div>
    <div class="stat"><div class="k">7月 总降雨</div><div class="v">788.2<small>mm</small></div></div>
    <div class="stat"><div class="k">8月 总降雨</div><div class="v">939.6<small>mm</small></div></div>
  </div>

  <div class="chart-card">
    <svg id="chart" viewBox="0 0 680 470" preserveAspectRatio="xMidYMid meet"></svg>
    <div id="tip"></div>
    <div class="legend">
      <span><i style="background:var(--accent)"></i>最高气温</span>
      <span><i style="background:var(--cool)"></i>最低气温</span>
      <span><i style="background:#C9A227"></i>强降雨日</span>
      <span><span class="bar" style="background:var(--prec)"></span>降雨量(mm)</span>
    </div>
    <div class="note">上图：气温走势（左轴 ℃）；下图：每日降雨量（右轴 mm）。竖虚线为 7月/8月 分界。</div>
  </div>
</div>

<script>
// 气温（IP.cn，与前期一致）
const julHi=[30,32,28,34,35,34,34,31,33,30,34,35,36,34,24,30,35,35,31,27,33,34,33,32,30,33,33,30,30,32,30];
const julLo=[24,24,25,25,22,25,24,25,25,25,25,25,25,23,23,22,24,26,25,23,23,24,25,24,25,26,24,24,23,22,23];
const augHi=[32,32,34,30,32,35,35,27,33,33,31,30,29,31,31,29,32,31,26,31,30,32,28,26,32,31,22,27,27,29,30];
const augLo=[24,24,25,23,24,25,26,21,23,24,24,22,22,23,24,24,24,24,24,24,24,23,21,21,22,21,20,22,20,22,22];
// 降雨量（tianqi24，mm）
const julPrec=[23.46,8.59,35.0,0,9.75,0,102.48,1.07,1.92,28.75,0.13,68.49,0,0.19,9.08,0,0.13,0,10.08,33.2,0.07,1.95,31.1,108.1,41.63,33.31,60.96,106.1,71.76,0,0.88];
const augPrec=[0,10.32,3.09,43.78,55.47,2.17,0,95.14,0.78,0,2.05,122.76,8.8,78.9,17.23,20.6,4.46,0.82,106.46,41.92,40.62,4.41,5.51,0.62,1.15,15.62,202.97,1.01,1.38,0.33,51.2];

const hi=julHi.concat(augHi), lo=julLo.concat(augLo), prec=julPrec.concat(augPrec);
const N=hi.length;

const storm=new Set([27,28,29,3,26]); // 7/28,7/29,7/30, 8/4, 8/27

const W=680,H=470,PADL=42,PADR=46,PADT=20;
const x0=PADL,x1=W-PADR;
const tMin=18,tMax=38, y0=PADT, y1=320;          // 气温面板
const pBase=442, pTop=350, pMax=210;             // 降雨面板
const X=i=>x0+(i/(N-1))*(x1-x0);
const Y=t=>y1-((t-tMin)/(tMax-tMin))*(y1-y0);
const YP=m=>pBase-(m/pMax)*(pBase-pTop);

const svg=document.getElementById('chart');
const NS='http://www.w3.org/2000/svg';
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}

// 气温网格 + 左轴℃
for(let t=tMin;t<=tMax;t+=4){
  svg.appendChild(el('line',{x1:x0,y1:Y(t),x2:x1,y2:Y(t),stroke:'#EEE','stroke-width':1}));
  const tx=el('text',{x:x0-8,y:Y(t)+4,'text-anchor':'end','font-size':11,fill:'#8A8A8A'});
  tx.textContent=t+'°';svg.appendChild(tx);
}
// 降雨右轴 mm
[0,50,100,150,200].forEach(m=>{
  const tx=el('text',{x:x1+8,y:YP(m)+4,'text-anchor':'start','font-size':10,fill:'#2E86DE'});
  tx.textContent=m;svg.appendChild(tx);
});
svg.appendChild(el('text',{x:x1+8,y:pTop-6,'text-anchor':'start','font-size':10,fill:'#2E86DE'},));

// 日期标签（每5天 + 月末）
function dateLabel(i){return i<31?'7/'+(i+1):'8/'+(i-30);}
for(let i=0;i<N;i+=5){
  const tx=el('text',{x:X(i),y:H-14,'text-anchor':'middle','font-size':10,fill:'#1A1A1A'});
  tx.textContent=dateLabel(i);svg.appendChild(tx);
  svg.appendChild(el('line',{x1:X(i),y1:pBase+3,x2:X(i),y2:pBase+6,stroke:'#CCC','stroke-width':1}));
}
[30,61].forEach(i=>{ if(i>=N)return;
  const tx=el('text',{x:X(i),y:H-14,'text-anchor':'middle','font-size':10,fill:'#1A1A1A','font-weight':600});
  tx.textContent=dateLabel(i);svg.appendChild(tx);
});

// 月份分界竖虚线（贯穿两面板）
svg.appendChild(el('line',{x1:X(30.5),y1:y0,x2:X(30.5),y2:pBase,stroke:'#CCC','stroke-width':1,'stroke-dasharray':'4 4'}));
const mLab=el('text',{x:X(15),y:y0-6,'text-anchor':'middle','font-size':11,fill:'#1A1A1A','font-weight':600});mLab.textContent='7月';svg.appendChild(mLab);
const m2=el('text',{x:X(46),y:y0-6,'text-anchor':'middle','font-size':11,fill:'#1A1A1A','font-weight':600});m2.textContent='8月';svg.appendChild(m2);

// 强降雨阴影带
const bw=(x1-x0)/(N-1);
storm.forEach(i=>{
  svg.appendChild(el('rect',{x:X(i)-bw*0.5,y:y0,width:bw,height:y1-y0,fill:'#FBEFC9',opacity:.5}));
});

// 气温填充 + 双线
let area='M'+X(0)+' '+Y(hi[0]);
for(let i=1;i<N;i++)area+=' L'+X(i)+' '+Y(hi[i]);
for(let i=N-1;i>=0;i--)area+=' L'+X(i)+' '+Y(lo[i]);
area+=' Z';
svg.appendChild(el('path',{d:area,fill:'var(--band)',opacity:.6}));
let ph='M'+X(0)+' '+Y(hi[0]); for(let i=1;i<N;i++)ph+=' L'+X(i)+' '+Y(hi[i]);
svg.appendChild(el('path',{d:ph,fill:'none',stroke:'#FF5C1A','stroke-width':2.2,'stroke-linejoin':'round'}));
let pl='M'+X(0)+' '+Y(lo[0]); for(let i=1;i<N;i++)pl+=' L'+X(i)+' '+Y(lo[i]);
svg.appendChild(el('path',{d:pl,fill:'none',stroke:'#2E86DE','stroke-width':2.2,'stroke-linejoin':'round'}));

// 峰值标注
function mark(i,c){svg.appendChild(el('circle',{cx:X(i),cy:Y(hi[i]),r:3.2,fill:c,stroke:'#fff','stroke-width':1.2}));}
mark(12,'#FF5C1A');mark(26,'#FF5C1A');
const t1=el('text',{x:X(12),y:Y(hi[12])-8,'text-anchor':'middle','font-size':11,fill:'#FF5C1A','font-weight':600});t1.textContent='36℃';svg.appendChild(t1);
const t2=el('text',{x:X(26),y:Y(hi[26])+16,'text-anchor':'middle','font-size':11,fill:'#FF5C1A','font-weight':600});t2.textContent='22℃';svg.appendChild(t2);

// 降雨柱状图
for(let i=0;i<N;i++){
  const m=prec[i]; if(m<=0)continue;
  const h=YP(0)-YP(m);
  const heavy=m>=50;
  svg.appendChild(el('rect',{x:X(i)-bw*0.32,y:YP(m),width:bw*0.64,height:h,
    fill:heavy?'var(--prec-heavy)':'var(--prec)',rx:1.5,opacity:.9}));
  if(m>=80){ // 大雨标注数值
    const lb=el('text',{x:X(i),y:YP(m)-4,'text-anchor':'middle','font-size':9,fill:'#2E86DE','font-weight':600});
    lb.textContent=m.toFixed(0);svg.appendChild(lb);
  }
}
// 降雨面板基线
svg.appendChild(el('line',{x1:x0,y1:pBase,x2:x1,y2:pBase,stroke:'#2E86DE','stroke-width':1,opacity:.4}));

// 悬停交互
const tip=document.getElementById('tip');
const card=document.querySelector('.chart-card');
const guide=el('line',{x1:0,y1:y0,x2:0,y2:pBase,stroke:'#BBB','stroke-width':1,'stroke-dasharray':'3 3',opacity:0});
svg.appendChild(guide);
const dotHi=el('circle',{r:4,fill:'#FF5C1A',stroke:'#fff','stroke-width':1.5,opacity:0});
const dotLo=el('circle',{r:4,fill:'#2E86DE',stroke:'#fff','stroke-width':1.5,opacity:0});
svg.appendChild(dotHi);svg.appendChild(dotLo);
function svgPoint(evt){
  const r=svg.getBoundingClientRect();
  const px=(evt.clientX-r.left)/r.width*W;
  let i=Math.round((px-x0)/(x1-x0)*(N-1));
  return Math.max(0,Math.min(N-1,i));
}
function showTip(i,evt){
  guide.setAttribute('x1',X(i));guide.setAttribute('x2',X(i));guide.setAttribute('opacity',1);
  dotHi.setAttribute('cx',X(i));dotHi.setAttribute('cy',Y(hi[i]));dotHi.setAttribute('opacity',1);
  dotLo.setAttribute('cx',X(i));dotLo.setAttribute('cy',Y(lo[i]));dotLo.setAttribute('opacity',1);
  const r=svg.getBoundingClientRect();
  const cx=(X(i)/W)*r.width, cy=(Y(hi[i])/H)*r.height;
  tip.style.left=cx+'px';tip.style.top=cy+'px';tip.style.opacity=1;
  tip.innerHTML='<b>'+dateLabel(i)+'</b>'+(storm.has(i)?' ⛈':'')+
    '<br><span class="hi">高温 '+hi[i]+'℃</span>'+
    '<br><span class="lo">低温 '+lo[i]+'℃</span>'+
    '<br><span class="pr">降雨 '+prec[i].toFixed(1)+'mm</span>';
}
function hideTip(){tip.style.opacity=0;guide.setAttribute('opacity',0);dotHi.setAttribute('opacity',0);dotLo.setAttribute('opacity',0);}
svg.addEventListener('mousemove',e=>showTip(svgPoint(e),e));
svg.addEventListener('mouseleave',hideTip);
svg.addEventListener('touchstart',e=>showTip(svgPoint(e.touches[0]),e.touches[0]),{passive:true});
svg.addEventListener('touchmove',e=>showTip(svgPoint(e.touches[0]),e.touches[0]),{passive:true});
svg.addEventListener('touchend',hideTip);
</script>
</body>
</html>
